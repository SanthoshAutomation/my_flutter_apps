name: deutsch_ai_tutor
description: "DeutschMeister - AI-powered German Learning App"
publish_to: 'none'

version: 2.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  # HTTP for Claude API calls
  http: ^1.2.2
  # Local storage for progress & settings
  shared_preferences: ^2.3.3
  # Text-to-speech for audio lessons
  flutter_tts: ^4.2.0
  # Open YouTube / social media links
  url_launcher: ^6.3.1
  # Charts for progress
  fl_chart: ^0.69.0
  # Markdown rendering for AI responses
  flutter_markdown: ^0.7.4
  # Local notifications for daily reminders
  flutter_local_notifications: ^18.0.1
  # Timezone for scheduling
  timezone: ^0.9.4
  # Intl for date formatting
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
