name: assistant
description: "Your personal assistant - todos, notes, calendar & alarms."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  sqflite: ^2.3.3
  path: ^1.9.0
  flutter_local_notifications: ^17.2.3
  table_calendar: ^3.1.2
  provider: ^6.1.2
  http: ^1.2.2
  intl: ^0.19.0
  shared_preferences: ^2.3.2
  timezone: ^0.9.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
